<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cement Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      width: 90%;
      margin: 20px auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #555;
      color: #fff;
    }
    .subscribe {
      display: block;
      width: 200px;
      margin: 20px auto;
      padding: 12px;
      background: #28a745;
      color: #fff;
      text-align: center;
      text-decoration: none;
      border-radius: 5px;
    }
    .subscribe:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cement Price Comparison</h1>
    <p>Compare prices of cement, saria, tiles & more</p>
  </header>

  <div class="container">
    <h2>Available Products</h2>
    <table>
      <tr>
        <th>Product</th>
        <th>Price (₹)</th>
      </tr>
      <tr>
        <td>Cement</td>
        <td>320</td>
      </tr>
      <tr>
        <td>Saria</td>
        <td>550</td>
      </tr>
      <tr>
        <td>Tiles</td>
        <td>40</td>
      </tr>
    </table>

    <a href="subscribe.html" class="subscribe">Subscribe to Unlock Shop Info</a>
  </div>
</body>
</html>
